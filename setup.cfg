[flake8]
max-line-length = 85
extend-ignore = E203,W503
exclude =
    .git,
    .venv,
    venv,
    env,
    __pycache__,
    static,
    staticfiles,
    media,
    */migrations/*
statistics = True
per-file-ignores =
    config/settings/local.py:F401,F403,F405
    config/settings/production.py:F401,F403,F405
    config/settings/test.py:F401,F403,F405
